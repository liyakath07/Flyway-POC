version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: flyway-postgres

    environment:
      POSTGRES_USER: flyway
      POSTGRES_PASSWORD: flyway123
      POSTGRES_DB: appdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
